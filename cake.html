<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a Wish!</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f3d1f3;
            background-image: radial-gradient(rgba(255, 255, 255, 0.4) 15%, transparent 16%),
                              radial-gradient(rgba(255, 255, 255, 0.3) 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            color: #4a286d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 🎬 Smooth Page Slide-In Animation */
        @keyframes pageSlideIn {
            0% { opacity: 0; transform: translateX(60px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .white-card-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 2px solid #e1bee7;
            animation: pageSlideIn 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 5px;
        }

        #mic-instruction {
            font-size: 1.1rem;
            color: #7b4f9d;
            margin-bottom: 20px;
            background: rgba(243, 209, 243, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            border: 1px dashed #ba8bc7;
        }

        .candles-zone {
            display: flex;
            justify-content: center;
            gap: 2px;
            flex-wrap: wrap;
            max-width: 320px;
            margin: 0 auto 5px auto;
        }

        .candle {
            font-size: 1.3rem;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .candle.blown-out {
            transform: scaleY(0.7);
            opacity: 0.4;
            filter: grayscale(100%);
        }

        .cake-graphic {
            font-size: 5rem;
            margin-top: 20px;
            display: inline-block;
            cursor: pointer;
            user-select: none;
        }

        /* 🎪 Springy Letter Pop Animation Rules */
        @keyframes popInLetter {
            0% { opacity: 0; transform: scale(0.3); }
            70% { transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        #win-birthday-msg {
            font-size: 1.7rem; 
            margin-top: 25px;
            display: none;
            white-space: nowrap; 
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .pop-char {
            display: inline-block;
            opacity: 0;
            animation: popInLetter 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>
<body>

    <div class="white-card-container">
        <h2>Make a Wish! 🎂</h2>
        <p id="mic-instruction">
         Grant mic access and blow into your mic to put out the candles! <br> (Or click the cake if it doesn't work!)
        </p>
        <div class="candles-zone" id="candles-box"></div>
        <div class="cake-graphic" onclick="manualBlowOut()">🎂</div>
        
        <!-- Target area where our animated letters will build -->
        <div id="win-birthday-msg"></div>
    </div>

    <script>
        let candlesBlown = 0;
        let micStream = null;
        let audioCtx = null;
        let micInitialized = false;

        // Force browser to look for mic or resume audio stream on any interaction
        window.addEventListener('click', () => {
            if (!micInitialized) {
                setupMicrophoneBlow();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        });

        window.addEventListener('touchstart', () => {
            if (!micInitialized) {
                setupMicrophoneBlow();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            buildCandles();
            setupMicrophoneBlow();
        });

        function buildCandles() {
            const box = document.getElementById('candles-box');
            for(let i=1; i<=25; i++) {
                const span = document.createElement('span');
                span.id = "candle-" + i;
                span.classList.add('candle');
                span.innerText = "🕯️";
                box.appendChild(span);
            }
        }

        function triggerPopGreeting() {
            const container = document.getElementById('win-birthday-msg');
            const rawText = "🎉 HAPPY 25th BIRTHDAY! 🎉";
            container.innerHTML = '';
            container.style.display = 'flex';

            Array.from(rawText).forEach((char, index) => {
                const charSpan = document.createElement('span');
                if (char === ' ') {
                    charSpan.innerHTML = '&nbsp;';
                } else {
                    charSpan.innerText = char;
                }
                
                charSpan.classList.add('pop-char');
                charSpan.style.animationDelay = `${index * 0.04}s`;
                container.appendChild(charSpan);
            });
        }

        function blowOutNextCandle() {
            if (candlesBlown < 25) {
                candlesBlown++;
                const currentCandle = document.getElementById("candle-" + candlesBlown);
                if (currentCandle) {
                    currentCandle.classList.add('blown-out');
                    currentCandle.innerText = "✖️"; 
                }
                if (candlesBlown === 25) {
                    triggerPopGreeting();
                    document.getElementById('mic-instruction').innerHTML = " You blew them all out! YAYYYY! <3";
                    if (micStream) micStream.getTracks().forEach(t => t.stop());
                    if (audioCtx) audioCtx.close();
                }
            }
        }

        function manualBlowOut() {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            if (candlesBlown < 25) {
                let interval = setInterval(() => {
                    if (candlesBlown >= 25) clearInterval(interval);
                    else blowOutNextCandle();
                }, 50);
            }
        }

        function setupMicrophoneBlow() {
            if (micInitialized) return;
            
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(function(stream) {
                micInitialized = true;
                micStream = stream;
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                const analyser = audioCtx.createAnalyser();
                const microphone = audioCtx.createMediaStreamSource(stream);
                const javascriptNode = audioCtx.createScriptProcessor(2048, 1, 1);

                analyser.smoothingTimeConstant = 0.3;
                analyser.fftSize = 256;
                microphone.connect(analyser);
                analyser.connect(javascriptNode);
                javascriptNode.connect(audioCtx.destination);

                javascriptNode.onaudioprocess = function() {
                    if (candlesBlown >= 25) return;
                    const array = new Uint8Array(analyser.frequencyBinCount);
                    analyser.getByteFrequencyData(array);
                    let values = 0;
                    for (let i = 0; i < array.length; i++) values += array[i];
                    let averageVolume = values / array.length;
                    
                    // Raised to 55 so background sounds won't trigger it accidentally!
                    if (averageVolume > 55) {
                        blowOutNextCandle();
                    }
                };
            })
            .catch(err => {
                console.log("Mic blocked or uninitialized yet:", err);
            });
        }
    </script>
</body>
</html>
