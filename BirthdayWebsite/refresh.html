<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation Sandbox</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .container {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Navigation Test Page</h2>
        <p>Use the buttons below to test how the browser's native Left/Right arrows will act.</p>
        
        <!-- Simulates the Left Arrow (Back) -->
        <button id="goBack">← Go Back</button>
        
        <!-- Simulates the Right Arrow (Forward) -->
        <button id="goForward">Go Forward →</button>
    </div>

    <script>
        // Clicking this does exactly what the browser's Left Arrow (Back) does
        document.getElementById('goBack').addEventListener('click', () => {
            window.history.back();
        });

        // Clicking this does exactly what the browser's Right Arrow (Forward) does
        document.getElementById('goForward').addEventListener('click', () => {
            window.history.forward();
        });
    </script>

</body>
</html>
