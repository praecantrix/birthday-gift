<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for a cute, playful handwritten look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* Custom Pop-up Modal Styling */
        .modal-overlay {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(74, 40, 109, 0.4); 
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-box {
            background-color: #ffffff;
            border: 3px solid #ba8bc7;
            border-radius: 16px;
            width: 90%;
            max-width: 380px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            animation: popUpScale 0.3s ease-out forwards;
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #7b4f9d;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-message {
            font-size: 1.2rem;
            color: #4a286d;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .btn-modal-close {
            font-family: 'Comic Neue', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #ffffff;
            background-color: #ba8bc7;
            border: none;
            border-radius: 8px;
            padding: 8px 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }

        .btn-modal-close:hover {
            background-color: #4a286d;
        }

        @keyframes popUpScale {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<!-- SMOOTH SCREEN FADE OVERLAY -->
<div id="loginTransitionOverlay" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #ffffff; /* Fades out to a clean white background */
    z-index: 9999;
    pointer-events: none;
    opacity: 1; /* FIXED: Starts at 1 so the page opens up completely white first */
    transition: opacity 0.5s ease;
"></div>

    <div class="login-container">
        <h1>HAPPY BIRTHDAY DADDY! &lt;3 &lt;3</h1>
        
        <p class="subtitle">I made this website specifically for you. &lt;3</p>
        <p class="instructions">But before you get access to it, you must fill in the username and the password!</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username:</label>
                <input type="text" id="username" autocomplete="off" required>
            </div>

            <div class="input-group">
                <label for="password">Password:</label>
                <input type="password" id="password" required>
            </div>

            <!-- Vertically stacked button container -->
            <div class="button-stack">
                <!-- FIXED HINT: Updated to display your exact text string -->
                <button type="button" class="btn btn-secondary" onclick="showPopup('! Little Hint !', 'The password is a safe word.', false)">Hint</button>
                <button type="submit" class="btn btn-primary">Confirm</button>
            </div>
        </form>
    </div>

    <!-- THE DYNAMIC CUSTOM POP-UP CONTAINER -->
    <div class="modal-overlay" id="customAlert">
        <div class="modal-box">
            <div class="modal-title" id="popupTitle">Title</div>
            <div class="modal-message" id="popupMessage">Message text goes here...</div>
            <div class="modal-buttons">
                <button class="btn-modal-close" onclick="closePopup()">OK</button>
            </div>
        </div>
    </div>

    <script>
        // FIXED: Fades out the white screen instantly when the page loads up!
        window.onload = function() {
            setTimeout(() => {
                const overlay = document.getElementById('loginTransitionOverlay');
                if (overlay) {
                    overlay.style.opacity = '0';
                }
            }, 50); 
        };

        let clearInputsOnClose = false;

        function showPopup(titleText, messageText, shouldClear) {
            document.getElementById('popupTitle').innerText = titleText;
            document.getElementById('popupMessage').innerText = messageText;
            clearInputsOnClose = shouldClear;
            document.getElementById('customAlert').style.display = 'flex';
        }

        function closePopup() {
            document.getElementById('customAlert').style.display = 'none';
            if (clearInputsOnClose) {
                document.getElementById('username').value = "";
                document.getElementById('password').value = "";
            }
        }
        

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            // FIXED CREDENTIALS: Username is Daddy, Password is Butterfly!
            const correctUsername = "Daddy"; 
            const correctPassword = "Butterfly"; 

            if (usernameInput === correctUsername && passwordInput === correctPassword) {
                // 1. Activate the smooth overlay blend
                const overlay = document.getElementById('loginTransitionOverlay');
                if (overlay) {
                    overlay.style.opacity = '1';
                }
                
                // 2. Allow the fade out animation to seamlessly finish, then move pages
                setTimeout(() => {
                    window.location.href = "chess.html"; 
                }, 500);
            } else {
                showPopup("! Access Denied !", "Try again. It's incorrect, Daddy!", true);
            }
        });
    </script>
</body>
</html>
