<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Chess Match!</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f3d1f3;
            background-image: radial-gradient(rgba(255, 255, 255, 0.4) 15%, transparent 16%),
                              radial-gradient(rgba(255, 255, 255, 0.3) 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            color: #4a286d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 🎬 Smooth Page Slide-In Animation */
        @keyframes pageSlideIn {
            0% {
                opacity: 0;
                transform: translateX(60px);
            }
            100% {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .white-card-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 520px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid #e1bee7;
            animation: pageSlideIn 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .instructions-box {
            background-color: rgba(243, 209, 243, 0.3);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            border: 2px dashed #ba8bc7;
            width: 100%;
        }

        .instructions-box p {
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 45px);
            grid-template-rows: repeat(8, 45px);
            border: 5px solid #4a286d;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            margin-bottom: 25px;
        }

        .square {
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            user-select: none;
            cursor: pointer;
        }

        .light { background-color: #fceeff; }
        .dark { background-color: #d8b4e2; }
        .selected { background-color: #ba8bc7 !important; }
        .white-piece { color: #ffffff; text-shadow: 0 0 3px #000, 0 0 3px #000; }
        .black-piece { color: #000000; }
        .skip-container { margin-top: 10px; font-size: 1rem; }
        .btn-skip { background: none; border: none; color: #7b4f9d; text-decoration: underline; font-family: 'Comic Neue', sans-serif; font-weight: 700; cursor: pointer; margin-left: 5px; }
        .btn-skip:hover { color: #4a286d; }
    </style>
</head>
<body>

<div id="control-widget" style="position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; z-index: 999;">
    <div id="game-timer" style="background-color: #ffffff; border: 2px solid #ba8bc7; border-radius: 12px; padding: 8px 15px; font-family: 'Comic Neue', sans-serif; font-weight: bold; font-size: 1.2rem; color: #4a286d; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; min-width: 100px;">
        ⏳ <span id="timer-display">30:00</span>
    </div>
    <button id="btn-reset" onclick="resetBoardToStart()" style="background-color: #ffffff; border: 2px solid #ba8bc7; border-radius: 12px; padding: 6px 12px; font-family: 'Comic Neue', sans-serif; font-weight: bold; font-size: 0.9rem; color: #7b4f9d; box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; transition: all 0.2s ease;" onmouseover="this.style.backgroundColor='#fceeff'; this.style.color='#4a286d'" onmouseout="this.style.backgroundColor='#ffffff'; this.style.color='#7b4f9d'">
         Reset Board
    </button>
</div>

    <div class="white-card-container">
        <h2>Play Against My Bot! &lt;3</h2>
        <div class="instructions-box">
            <p><strong> Birthday Puzzle:</strong> Things have gotten a little chaotic on the board! Find the single move to checkmate my bot instantly.</p>
        </div>
        <div class="chess-board" id="board"></div>
        <div class="skip-container">
            <span>Stuck or running out of time? It's okay, take your time!</span>
            <button class="btn-skip" onclick="openSkipModal()">Would you like to skip it?</button>
        </div>
    </div>

<div id="skipModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(74, 40, 109, 0.4); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center;">
    <div style="background-color: #ffffff; border: 3px solid #ba8bc7; border-radius: 16px; width: 90%; max-width: 380px; padding: 25px; text-align: center; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); font-family: 'Comic Neue', sans-serif;">
        <div style="font-size: 1.4rem; font-weight: 700; color: #7b4f9d; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">Skip Match?</div>
        <div style="font-size: 1.2rem; color: #4a286d; margin-bottom: 20px; line-height: 1.4;">Do you want to skip this match, Daddy?</div>
        <div style="display: flex; justify-content: center; gap: 15px;">
            <button onclick="confirmSkip()" style="font-family: 'Comic Neue', sans-serif; font-weight: 700; font-size: 1.1rem; border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer; color: #ffffff; background-color: #ba8bc7; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">Yes</button>
            <button onclick="closeSkipModal()" style="font-family: 'Comic Neue', sans-serif; font-weight: 700; font-size: 1.1rem; border: none; border-radius: 8px; padding: 8px 20px; cursor: pointer; color: #4a286d; background-color: #e8d7f0; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">No</button>
        </div>
    </div>
</div>

    <script>
        const STARTING_FEN = "r1bqkbnr/pppp1ppp/2n5/4p2Q/2B1P3/8/PPPP1PPP/RNB1K1NR w KQkq - 4 4";
        let timeLeft = 1800; 
        let countdown;
        let game;
        let selectedSquare = null;

        const boardElement = document.getElementById('board');
        const timerDisplay = document.getElementById('timer-display');
        const timerBox = document.getElementById('game-timer');

        const whiteSymbols = { 'p': '♙', 'r': '♖', 'n': '♘', 'b': '♗', 'q': '♕', 'k': '♔' };
        const blackSymbols = { 'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚' };

        window.addEventListener('DOMContentLoaded', () => {
            game = new Chess(STARTING_FEN);
            createBoard();
            startTimer();
        });

        function startTimer() {
            clearInterval(countdown);
            countdown = setInterval(function() {
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    // ⏱️ Time Up handler: Set the gentle headline message
                    localStorage.setItem('letterHeading', "It's totally okay, I'm glad you made it anyway! :)");
                    window.location.href = 'letter.html';
                    return;
                }
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                seconds = seconds < 10 ? '0' + seconds : seconds;
                minutes = minutes < 10 ? '0' + minutes : minutes;
                if (timerDisplay) timerDisplay.innerText = minutes + ":" + seconds;
                if (timeLeft <= 120 && timerBox) {
                    timerBox.style.color = '#ff4d4d';
                    timerBox.style.borderColor = '#ff4d4d';
                }
                timeLeft--;
            }, 1000);
        }

        function createBoard() {
            boardElement.innerHTML = '';
            const columns = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
            for (let row = 8; row >= 1; row--) {
                for (let col = 0; col < 8; col++) {
                    const squareName = columns[col] + row;
                    const square = document.createElement('div');
                    square.classList.add('square', (row + col) % 2 === 0 ? 'light' : 'dark');
                    square.id = squareName;
                    square.addEventListener('click', () => handleSquareClick(squareName));
                    boardElement.appendChild(square);
                }
            }
            renderPieces();
        }

        function renderPieces() {
            const columns = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];
            for (let row = 8; row >= 1; row--) {
                for (let col = 0; col < 8; col++) {
                    const squareName = columns[col] + row;
                    const squareEl = document.getElementById(squareName);
                    const piece = game.get(squareName);
                    squareEl.innerHTML = '';
                    squareEl.classList.remove('selected');
                    if (piece) {
                        const span = document.createElement('span');
                        span.innerText = piece.color === 'w' ? whiteSymbols[piece.type] : blackSymbols[piece.type];
                        span.classList.add(piece.color === 'w' ? 'white-piece' : 'black-piece');
                        squareEl.appendChild(span);
                    }
                    if (selectedSquare === squareName) squareEl.classList.add('selected');
                }
            }
            
            // 👑 Win State handler: Set completion message if checkmate is found
            if (game.in_checkmate()) {
                clearInterval(countdown);
                localStorage.setItem('letterHeading', "Good job! You finally completed it! &lt;3");
                setTimeout(() => { window.location.href = 'letter.html'; }, 600);
            }
        }

        function handleSquareClick(squareName) {
            if (game.game_over()) return;
            const piece = game.get(squareName);
            if (selectedSquare === null) {
                if (piece && piece.color === 'w') { selectedSquare = squareName; renderPieces(); }
            } else {
                if (selectedSquare === squareName) { selectedSquare = null; renderPieces(); return; }
                const move = game.move({ from: selectedSquare, to: squareName, promotion: 'q' });
                selectedSquare = null;
                if (move === null) {
                    if (piece && piece.color === 'w') selectedSquare = squareName;
                    renderPieces();
                } else {
                    renderPieces();
                    if (!game.game_over()) setTimeout(makeBotMove, 500);
                }
            }
        }

        function makeBotMove() {
            const moves = game.moves();
            if (moves.length === 0) return;
            game.move(moves[Math.floor(Math.random() * moves.length)]);
            renderPieces();
        }

        function resetBoardToStart() { selectedSquare = null; game = new Chess(STARTING_FEN); createBoard(); }
        function openSkipModal() { document.getElementById('skipModal').style.display = 'flex'; }
        function closeSkipModal() { document.getElementById('skipModal').style.display = 'none'; }
        
        // ⏩ Skip handler: Set gentle skipped message
        function confirmSkip() { 
            clearInterval(countdown); 
            closeSkipModal(); 
            localStorage.setItem('letterHeading', "It's totally okay, I'm glad you made it anyway! :)");
            window.location.href = 'letter.html'; 
        }
    </script>
</body>
</html>
